<div
  class="relative min-h-screen flex items-center justify-center px-4 bg-cover bg-center bg-no-repeat"
  style="
    background-image: url('https://media2.dev.to/dynamic/image/width=1600,height=900,fit=cover,gravity=auto,format=auto/https://dev-to-uploads.s3.amazonaws.com/uploads/articles/bp1dx1b0rv3p8zij896i.png');
  "
>
  <!-- Main Content -->
  <div class="relative z-10 w-full max-w-lg text-center">
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 rounded-full bg-[#7355a1] flex items-center justify-center shadow-lg">
        <img src="https://framerusercontent.com/images/1cSAzSXl87VyotAiLwsIyNezE.svg" />
      </div>
    </div>

    <!-- Hero Heading -->
    <h1 class="text-[38px] text-gray-800 font-semibold leading-tight">
      Verify access by entering your
      <span class="italic niconne text-[#7355a1] text-5xl">Invite Code!</span>
    </h1>

    <!-- Subtitle -->
    <p class="text-gray-700 mt-4 max-w-md mx-auto">
      Enter & verify your code to unlock early access and get a head start in revolutionizing
      healthcare.
    </p>

    <!-- Glass Card -->
    <div
      class="mt-10 backdrop-blur-xl bg-white/20 border border-white/30 rounded-2xl shadow-2xl p-8"
    >
      <h2 class="text-lg font-semibold text-black">Verify your invite code</h2>

      <p class="text-sm text-gray-700 mb-6">Enter your code below to confirm and continue.</p>

      <!-- Form -->
      <div class="flex items-center gap-4">
        <!-- Invite Code Input -->
        <div class="w-full">
          <app-input-field
            placeholder="Invite Code"
            [formControl]="codeControl"
            [errorMessage]="codeError"
          />
        </div>

        <!-- Button -->
        <div class="min-w-fit">
          <app-button
            label="Verify Code"
            type="submit"
            [loading]="isLoading"
            (onClick)="onSubmit()"
          />
        </div>
      </div>

      <!-- Error Message -->
      <p *ngIf="errorMessage" class="text-sm text-red-400 text-center mt-4">
        {{ errorMessage }}
      </p>
    </div>

    <!-- Footer -->
    <p class="text-sm mt-8">
      Don’t have a code?
      <a routerLink="/join-beta" class="font-semibold text-purple-800 underline underline-offset-2">
        Join waitlist
      </a>
    </p>
  </div>
</div>
