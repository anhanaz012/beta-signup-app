<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <div class="mb-8 text-center">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-gray-900 rounded-xl mb-4">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"
          />
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-gray-900">Enter Invite Code</h1>
      <p class="text-sm text-gray-500 mt-1">You need a valid invite code to access the beta</p>
    </div>

    <div class="space-y-4">
      <app-input-field
        label="Invite Code"
        placeholder="e.g. BETA-2024"
        [formControl]="codeControl"
        [errorMessage]="codeError"
      />

      <p *ngIf="errorMessage" class="text-sm text-red-500 text-center">
        {{ errorMessage }}
      </p>

      <app-button label="Verify Code" type="submit" [loading]="isLoading" (onClick)="onSubmit()" />
    </div>

    <p class="text-center text-sm text-gray-400 mt-6">
      Don't have a code?
      <a routerLink="/join-beta" class="text-gray-900 font-medium underline underline-offset-2"
        >Join the waitlist</a
      >
    </p>
  </div>
</div>
