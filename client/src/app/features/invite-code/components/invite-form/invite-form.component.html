<div
  class="relative min-h-screen py-10 flex items-center justify-center px-4 bg-cover bg-center bg-no-repeat page-bg"
>
  <!-- Main Content -->
  <div class="relative z-10 w-full max-w-lg text-center">
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center shadow-lg">
        <img src="assets/images/logo.png" class="h-12 w-12" alt="logo" />
      </div>
    </div>

    <!-- Hero Heading -->
    <h1 class="md:text-[38px] text-2xl text-gray-800 font-semibold leading-tight">
      Verify access by entering your
      <span class="italic niconne text-primary text-3xl md:text-5xl">Invite Code!</span>
    </h1>

    <!-- Subtitle -->
    <p class="text-gray-700 mt-4 max-w-md mx-auto">
      Enter & verify your code to unlock early access and get a head start in revolutionizing
      healthcare.
    </p>

    <!-- Glass Card -->
    <div
      class="mt-10 backdrop-blur-xl bg-white/20 border border-white/30 rounded-2xl shadow-2xl p-8"
    >
      <h2 class="text-lg font-semibold text-black">Verify your invite code</h2>

      <p class="text-sm text-gray-700 mb-6">Enter your code below to confirm and continue.</p>

      <!-- Form -->
      <div class="md:flex md:flex-row flex-col gap-4">
        <!-- Invite Code Input -->
        <div class="w-full">
          <app-input-field
            placeholder="Invite Code"
            [formControl]="codeControl"
            [errorMessage]="codeError"
          />
        </div>

        <!-- Button -->
        <div class="min-w-fit mt-4 md:mt-0 flex justify-center">
          <app-button
            label="Verify Code"
            type="submit"
            [loading]="isLoading"
            (onClick)="onSubmit()"
          />
        </div>
      </div>
      <!-- Error Message -->
      @if (errorMessage) {
        <div
          class="flex items-center justify-center mt-4 p-3 border border-red-300 bg-red-50 rounded-xl"
        >
          <svg class="w-5 h-5 text-red-500 mr-2" fill="currentColor" viewBox="0 0 20 20">
            <path
              fill-rule="evenodd"
              d="M18 10c0 4.418-3.582 8-8 8s-8-3.582-8-8 3.582-8 8-8 8 3.582 8 8zm-9-4a1 1 0 112 0v4a1 1 0 11-2 0V6zm1 8a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"
              clip-rule="evenodd"
            />
          </svg>
          <p class="text-sm text-red-700 font-medium">{{ errorMessage }}</p>
        </div>
      }
    </div>

    <!-- Footer -->
    <p class="text-sm mt-8">
      Don’t have a code?
      <a routerLink="/join-beta" class="font-semibold text-purple-800 underline underline-offset-2">
        Join waitlist
      </a>
    </p>
  </div>
</div>
