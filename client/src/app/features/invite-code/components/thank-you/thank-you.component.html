<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div
    class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center"
  >
    <div class="inline-flex items-center justify-center w-16 h-16 bg-green-50 rounded-full mb-6">
      <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
      </svg>
    </div>

    <h1 class="text-2xl font-semibold text-gray-900">You're In!</h1>
    <p class="text-sm text-gray-500 mt-2 mb-8">
      Your invite code has been verified. Join the beta waitlist to secure your spot.
    </p>

    <app-button label="Join Beta Waitlist" variant="primary" (onClick)="goToJoinBeta()" />
  </div>
</div>
