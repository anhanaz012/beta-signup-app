<div
  class="relative min-h-screen flex items-center justify-center px-4 bg-cover bg-center bg-no-repeat"
  style="
    background-image: url('https://media2.dev.to/dynamic/image/width=1600,height=900,fit=cover,gravity=auto,format=auto/https://dev-to-uploads.s3.amazonaws.com/uploads/articles/bp1dx1b0rv3p8zij896i.png');
  "
>
  <!-- Main Content -->
  <div class="relative z-10 w-full max-w-lg text-center">
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 rounded-full bg-[#7355a1] flex items-center justify-center shadow-lg">
        <img src="https://framerusercontent.com/images/1cSAzSXl87VyotAiLwsIyNezE.svg" />
      </div>
    </div>

    <!-- Heading -->
    <h1 class="text-[38px] text-gray-800 font-semibold leading-tight">
      Invite Code
      <span class="italic niconne text-[#7355a1] text-5xl">Approved!</span>
    </h1>

    <!-- Subtitle -->
    <p class="text-gray-700 mt-4 max-w-md mx-auto">
      Your invite code has been verified successfully. Join the beta waitlist to secure your early
      access.
    </p>

    <!-- Glass Card -->
    <div
      class="mt-10 backdrop-blur-xl bg-white/20 border border-white/30 rounded-2xl shadow-2xl p-8 text-center"
    >
      <!-- Success Icon -->
      <img
        src="https://png.pngtree.com/png-vector/20260127/ourmid/pngtree-premium-purple-verified-badge-3d-icon-with-white-checkmark-png-image_18642104.webp"
        class="flex h-36 w-h-36 mx-auto mb-4"
      />

      <h2 class="text-lg font-semibold text-black mb-2">Invite Code Verified</h2>

      <p class="text-sm text-gray-700 mb-6">
        You're eligible for early access. Continue to join the beta waitlist.
      </p>

      <!-- Button -->
      <div class="flex items-center mt-4 justify-center">
        <app-button label="Join Beta Waitlist" variant="primary" (onClick)="goToJoinBeta()" />
      </div>
    </div>

    <!-- Footer -->
    <p class="text-sm mt-8 text-gray-700">
      Already signed up?
      <a
        routerLink="/invite-code"
        class="font-semibold text-purple-800 underline underline-offset-2"
      >
        Verify another code
      </a>
    </p>
  </div>
</div>
