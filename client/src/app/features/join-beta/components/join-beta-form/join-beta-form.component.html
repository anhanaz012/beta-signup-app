<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <div class="mb-8 text-center">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-gray-900 rounded-xl mb-4">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"
          />
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-gray-900">Join the Beta</h1>
      <p class="text-sm text-gray-500 mt-1">Be among the first to experience our product</p>
    </div>

    <div class="space-y-4">
      <app-input-field
        label="Full Name"
        placeholder="John Doe"
        [formControl]="$any(form.get('name'))"
        [errorMessage]="nameError"
      />

      <app-input-field
        label="Email Address"
        type="email"
        placeholder="john@example.com"
        [formControl]="$any(form.get('email'))"
        [errorMessage]="emailError"
      />

      <p
        *ngIf="successMessage"
        class="text-sm text-green-600 text-center bg-green-50 rounded-xl py-3 px-4"
      >
        {{ successMessage }}
      </p>

      <p *ngIf="errorMessage" class="text-sm text-red-500 text-center">
        {{ errorMessage }}
      </p>

      <app-button
        label="Join Waitlist"
        type="submit"
        [loading]="isLoading"
        (onClick)="onSubmit()"
      />
    </div>
  </div>
</div>
